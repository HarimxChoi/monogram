version: 2
updates:
  # Python dependencies — weekly
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:00"
      timezone: "Asia/Seoul"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "python"
    # Group minor + patch updates into single PRs to reduce churn;
    # major updates get individual PRs for deliberate review.
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
    # Security alerts override ignore rules by default.
    ignore:
      # Pin yt-dlp loosely (monthly releases) but don't auto-bump
      # major versions — YouTube-side breakages require manual testing.
      - dependency-name: "yt-dlp"
        update-types:
          - "version-update:semver-major"

  # GitHub Actions — monthly (Actions move slower)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "github-actions"
    groups:
      all-actions:
        patterns:
          - "*"
