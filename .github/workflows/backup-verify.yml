name: backup-verify

# Monthly restore-drill against <your-github-user>/mono-backup.
# Fails loudly if the backup is missing, empty, or diverged from source.
# Uses a separate BACKUP_GITHUB_PAT (scoped only to the backup repo).
#
# Per CONTRIBUTING.md, this is a scheduled maintenance job — human action
# required on failure (likely PAT rotation or mirror-job regression).

on:
  schedule:
    # 1st of each month at 04:00 UTC = 13:00 KST
    - cron: "0 4 1 * *"
  workflow_dispatch:

jobs:
  verify:
    name: "monogram backup verify"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: pip install -e '.'

      - name: Run verification
        env:
          GITHUB_PAT: ${{ secrets.MONO_VAULT_PAT }}
          GITHUB_REPO: ${{ secrets.MONO_VAULT_REPO }}
          BACKUP_GITHUB_PAT: ${{ secrets.BACKUP_VAULT_PAT }}
          BACKUP_GITHUB_REPO: ${{ secrets.BACKUP_VAULT_REPO }}
        run: monogram backup verify --json

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Backup verification failed. See job output above."
          echo "::error::Likely causes:"
          echo "::error::  1. BACKUP_GITHUB_PAT expired — rotate it"
          echo "::error::  2. Backup repo deleted or renamed"
          echo "::error::  3. Nightly mirror-job hasn't been running"
          echo "::error::  4. File-count delta exceeds 5% (partial mirror)"
