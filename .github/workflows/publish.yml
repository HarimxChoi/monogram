name: publish

# Triggered by tag push matching v0.*.*
# Requires PyPI Trusted Publisher configuration:
#   - https://pypi.org/manage/account/publishing/
#   - Repository: <your-github-user>/monogram
#   - Workflow: publish.yml
#   - Environment: pypi
# Attestations are generated automatically by pypa/gh-action-pypi-publish
# (default since 2024 for Trusted Publishing flows).

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"  # pre-releases
  workflow_dispatch:  # manual trigger for emergency republish

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches pyproject.toml version
        # Catches: tag v1.0.0 on a commit where pyproject still says
        # 0.8.0.dev0 → would ship a dev wheel under a stable tag.
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          FILE_VERSION=$(grep -E '^version\s*=' pyproject.toml | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          if [ "$TAG_VERSION" != "$FILE_VERSION" ]; then
            echo "::error::Tag $TAG_VERSION does not match pyproject.toml version $FILE_VERSION"
            exit 1
          fi
          echo "Version match confirmed: $TAG_VERSION"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build
        run: python -m pip install --upgrade build
      - name: Build sdist + wheel
        run: python -m build
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  publish-to-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    # Stable releases only — pre-release tags (-rc1, -beta) go to TestPyPI
    if: "!contains(github.ref, '-')"
    environment:
      name: pypi
      url: https://pypi.org/p/monogram
    permissions:
      id-token: write  # REQUIRED for OIDC Trusted Publishing
    steps:
      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  publish-to-testpypi:
    name: Publish to TestPyPI (pre-releases only)
    needs: build
    runs-on: ubuntu-latest
    if: contains(github.ref, '-')  # only for v*.*.*-* pre-release tags
    environment:
      name: testpypi
      url: https://test.pypi.org/p/monogram
    permissions:
      id-token: write
    steps:
      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
